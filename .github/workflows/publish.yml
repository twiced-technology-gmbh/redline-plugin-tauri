name: Publish to crates.io

on:
  push:
    branches: [prod]

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version is not already published
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "Publishing tauri-plugin-redline v${VERSION}"
          if cargo search tauri-plugin-redline --limit 1 | grep -q "\"${VERSION}\""; then
            echo "::error::Version ${VERSION} is already published on crates.io. Bump version in Cargo.toml first."
            exit 1
          fi
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
